name: CI / CD

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pos-billing-shahjahan

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#  CI / Build:
#    DATABASE_URL            — postgres connection string (used at build time)
#    NEXT_PUBLIC_SUPABASE_URL      — (optional) public Supabase URL if used
#    NEXT_PUBLIC_SUPABASE_ANON_KEY — (optional) public Supabase anon key if used
#
#  CD / Deploy (only needed for master branch deploys):
#    SSH_HOST          — IP or hostname of your VPS / Hostinger server
#    SSH_USER          — SSH username (e.g. root or ubuntu)
#    SSH_PRIVATE_KEY   — contents of your private SSH key (~/.ssh/id_rsa)
#    SSH_PORT          — SSH port (default 22)
#    DEPLOY_PATH       — absolute path on server where docker-compose.yml lives
#                        e.g. /opt/pos-billing
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Job 1: Lint + Build (runs on every push and PR) ─────────────────────────
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_BUILD_STANDALONE: 'true'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ── Job 2: Build & Push Docker image to GHCR (master only) ──────────────────
  docker:
    name: Build & Push Docker Image
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ── Job 3: SSH Deploy to VPS / Hostinger (master only) ──────────────────────
  deploy:
    name: Deploy to Server
    needs: docker
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Check SSH secrets are configured
        id: check
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "SSH_HOST secret is not set — skipping deployment."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Checkout code
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Copy docker-compose and env file to server
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml,.env.production"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ghcr.io/${{ env.IMAGE_NAME }}:latest
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE,DEPLOY_PATH
          script: |
            set -e

            # Pull latest image from GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE"

            # Restart the app container using explicit compose file path
            docker compose -f "$DEPLOY_PATH/docker-compose.yml" up -d pos-app

            # Remove dangling images to free disk space
            docker image prune -f

            echo "Deployment complete."
