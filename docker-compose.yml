services:
  caddy:
    image: caddy:2-alpine
    container_name: pos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - pos-app

  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_billing
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_billing"]
      interval: 10s
      timeout: 5s
      retries: 5

  pos-app:
    image: ghcr.io/abuzarall-ctrl/pos-billing-shahjahan:latest
    container_name: pos-billing
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://pos_user:pos_password@postgres:5432/pos_billing
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
